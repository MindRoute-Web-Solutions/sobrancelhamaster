<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Aviso de Cookies</title>
  
  <!-- ============================================
       ÁREA PARA GOOGLE ANALYTICS (INSIRA SEU CÓDIGO AQUI)
       ============================================ -->
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-RLSQ6P33D9"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-RLSQ6P33D9');
</script>
  
  <style>
    /* Reset básico */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Estilos mobile-first */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #434343;
      padding: 20px;
    }

    /* Container principal */
    .container {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
    }

    /* Caixa de aviso de cookies */
    .cookie-box {
      background: #ffffff;
      border-radius: 24px;
      padding: 2rem 1.5rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08), 0 2px 8px rgba(0, 0, 0, 0.04);
      text-align: center;
      transition: opacity 0.2s ease;
    }

    .cookie-box h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .cookie-box p {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #2d2d3a;
      margin-bottom: 1.5rem;
    }

    .cookie-box p strong {
      color: #1a1a2e;
    }

    /* Grupo de botões */
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
    }

    /* Botões */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0.85rem 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 60px;
      background: #eef0f5;
      color: #1a1a2e;
      cursor: pointer;
      transition: all 0.15s ease;
      text-align: center;
      text-decoration: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-aceitar {
      background: #1a1a2e;
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(26, 26, 46, 0.15);
    }

    .btn-aceitar:hover,
    .btn-aceitar:active {
      background: #2a2a42;
      transform: scale(0.98);
    }

    .btn-rejeitar {
      background: #f0f2f7;
      color: #1a1a2e;
      border: 1px solid #dce0e8;
    }

    .btn-rejeitar:hover,
    .btn-rejeitar:active {
      background: #e4e7ef;
      transform: scale(0.98);
    }

    .btn:focus-visible {
      outline: 3px solid #1a1a2e;
      outline-offset: 2px;
    }

    /* Texto de ajuda */
    .helper-text {
      font-size: 0.7rem;
      color: #8888a0;
      margin-top: 1.2rem;
      opacity: 0.7;
      letter-spacing: 0.3px;
    }

    /* Ajustes para tablet/desktop */
    @media (min-width: 768px) {
      .cookie-box {
        padding: 2.5rem 2.2rem;
        border-radius: 28px;
      }
      
      .button-group {
        flex-direction: row;
        gap: 0.8rem;
      }
      
      .btn {
        width: auto;
        flex: 1;
        padding: 0.9rem 0.2rem;
      }
    }

    @media (min-width: 1024px) {
      .cookie-box {
        padding: 3rem 2.8rem;
        max-width: 480px;
      }
    }

    /* Para telas muito pequenas */
    @media (max-width: 380px) {
      .cookie-box {
        padding: 1.5rem 1rem;
      }
      .cookie-box h2 {
        font-size: 1.3rem;
      }
      .cookie-box p {
        font-size: 0.85rem;
      }
      .btn {
        font-size: 0.9rem;
        padding: 0.75rem 0.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Caixa de aviso de cookies -->
    <div class="cookie-box" id="cookieBox" role="dialog" aria-labelledby="cookieTitle" aria-modal="true">
      <h2 id="cookieTitle">Aviso de Cookies</h2>
      <p>
        <strong>Utilizamos cookies</strong> para melhorar sua experiência.
        Ao clicar em "Aceitar" você concorda com nossa política.
      </p>
      
      <div class="button-group">
        <button class="btn btn-aceitar" id="btnAceitar" data-acao="aceitar">Aceitar</button>
        <button class="btn btn-rejeitar" id="btnRejeitar" data-acao="rejeitar">Rejeitar</button>
      </div>
      
      <p class="helper-text">Clique fora da caixa para continuar</p>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // ============================================
      // CONFIGURAÇÕES - ALTERE AQUI
      // ============================================
      
      // URL de destino (coloque o link que deseja)
      const DESTINO_URL = 'https://go.hotmart.com/Q106171635U';
      
      // ============================================
      // FIM DAS CONFIGURAÇÕES
      // ============================================

      // Elementos da página
      const cookieBox = document.getElementById('cookieBox');
      const btnAceitar = document.getElementById('btnAceitar');
      const btnRejeitar = document.getElementById('btnRejeitar');

      // ============================================
      // FUNÇÃO DE RASTREAMENTO (Google Analytics)
      // ============================================
      
      /**
       * Função para rastrear eventos
       * Será chamada quando o usuário clicar em qualquer lugar
       * 
       * @param {string} acao - Tipo de ação (aceitar, rejeitar, fora)
       * @param {string} elemento - Elemento clicado (botao, fundo)
       */
      function rastrearEvento(acao, elemento) {
        // Verifica se o Google Analytics está disponível
        if (typeof gtag !== 'undefined') {
          gtag('event', 'clique', {
            'event_category': 'cookie_consent',
            'event_label': acao,
            'elemento': elemento,
            'timestamp': new Date().toISOString()
          });
        } else {
          // Fallback: console log para debugging (pode remover em produção)
          console.log(`[RASTREAMENTO] Ação: ${acao} | Elemento: ${elemento}`);
        }
      }

      // ============================================
      // FUNÇÃO DE REDIRECIONAMENTO
      // ============================================
      
      function redirecionar(acao, elemento) {
        // Rastreia o clique antes de redirecionar
        rastrearEvento(acao, elemento);
        
        // Redireciona para o destino
        window.location.href = DESTINO_URL;
      }

      // ============================================
      // EVENTOS DOS BOTÕES
      // ============================================
      
      btnAceitar.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        redirecionar('aceitar', 'botao_aceitar');
      });

      btnRejeitar.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        redirecionar('rejeitar', 'botao_rejeitar');
      });

      // ============================================
      // CLIQUE FORA DA CAIXA
      // ============================================
      
      // Captura cliques fora da caixa
      document.addEventListener('click', function(e) {
        // Verifica se o clique foi dentro da caixa
        if (cookieBox.contains(e.target)) {
          return; // Ignora cliques dentro da caixa
        }
        
        // Se não foi dentro da caixa, redireciona
        redirecionar('fora', 'fundo_tela');
      });

      // ============================================
      // RASTREAMENTO DE CLICK EM QUALQUER LUGAR (opcional)
      // ============================================
      
      // Rastreia cliques em toda a página para análise
      document.addEventListener('click', function(e) {
        // Se o Google Analytics estiver disponível e NÃO for um clique nos botões ou fora
        // (já rastreados separadamente), podemos ignorar
        // Esta função é apenas para rastrear cliques gerais
        if (typeof gtag !== 'undefined') {
          // Rastreia cliques genéricos para análise de comportamento
          gtag('event', 'clique_geral', {
            'event_category': 'interacao',
            'target': e.target.tagName || 'desconhecido',
            'timestamp': new Date().toISOString()
          });
        }
      });

      // ============================================
      // LOG DE INICIALIZAÇÃO (opcional)
      // ============================================
      
      console.log('✅ Página de aviso de cookies carregada');
      console.log(`📍 Redireciona para: ${DESTINO_URL}`);
      console.log('📊 Rastreamento de cliques ativo');

    })();
  </script>
</body>
</html>
